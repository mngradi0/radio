<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dead Air FM – The Yay Is In The Area</title>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 40px;
      margin: 0;
    }
    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.3rem;
      text-shadow: 0 0 10px #0f0;
    }
    p {
      font-size: 1.15rem;
      max-width: 620px;
      margin: 0.4rem auto;
      opacity: 0.9;
    }
    
    /* Responsive 16:9 video container */
    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      max-width: 960px;
      margin: 30px auto;
      border: 3px solid #0f0;
      box-shadow: 0 0 20px #0f0;
      background: #000;
    }
    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <h1>Dead Air FM</h1>
  <p>Unauthorized transmissions from somewhere in the East Bay.</p>
  <p>Broadcast season: Whenever I find the time</p>
  <p>Stay tuned… if you can find the signal.</p>
  
  <!-- YouTube Live embed – autoplay enabled (muted for browser autoplay policy) -->
  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/SnrdRLXtSnU?autoplay=1&amp;mute=1&amp;modestbranding=1&amp;rel=0" 
      title="Dead Air FM Live Stream" 
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      allowfullscreen>
    </iframe>
  </div>

  <p style="margin-top: 20px; font-size: 0.95rem; opacity: 0.7;">
    Audio starts muted (browser policy). Click the speaker icon on the player to unmute.<br>
    The signal is live and will keep broadcasting.
  </p>
</body>
</html>
